<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Assignment-5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F9FAFB; }
        .hide { display: none !important; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px; height: 36px; border-radius: 50%;
            border-left-color: #6366f1; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="login-page" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-2xl shadow-xl border border-gray-100 w-full max-w-md text-center">
            <img src="assets/github-logo.png" alt="GitHub Logo" class="w-20 h-20 mx-auto mb-4">
            <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm mb-8">Sign in to manage your issues</p>
            <form id="login-form" class="space-y-5 text-left">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                    <input type="text" id="username" placeholder="Enter Username" class="w-full px-4 py-3 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" placeholder="Enter Password" class="w-full px-4 py-3 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500 transition">
                </div>
                <p id="login-error" class="text-red-500 text-xs text-center font-medium hide">Invalid credentials!</p>
                <button type="submit" class="w-full bg-[#4F46E5] text-white py-3 rounded-lg font-bold hover:bg-indigo-700 shadow-lg transition-all active:scale-95">Sign In</button>
            </form>
        </div>
    </div>

    <div id="dashboard-page" class="hide min-h-screen">
        <nav class="bg-white px-8 py-4 flex flex-col md:flex-row justify-between items-center shadow-sm border-b sticky top-0 z-40">
            <div class="flex items-center gap-3 mb-4 md:mb-0">
                <img src="assets/github-logo.png" alt="Logo" class="w-10 h-10">
                <h1 class="font-black text-xl tracking-tight text-gray-800">GitHub Issues Tracker</h1>
            </div>
            <div class="flex items-center gap-4 w-full md:w-auto">
                <div class="relative w-full md:w-72">
                    <input type="text" id="search-input" placeholder="Search issues..." class="w-full pl-4 pr-10 py-2 bg-gray-100 border-none rounded-full text-sm outline-none focus:ring-2 focus:ring-indigo-400">
                    <button id="search-btn" class="absolute right-3 top-2 text-gray-400">🔍</button>
                </div>
                <button class="bg-[#4F46E5] text-white px-5 py-2 rounded-full text-sm font-bold shadow-md hover:bg-indigo-700 transition">+ New Issue</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-8">
            <div class="flex space-x-2 mb-8 bg-gray-200/50 p-1.5 rounded-xl w-fit">
                <button class="tab-btn active bg-[#4F46E5] text-white px-8 py-2 rounded-lg text-sm font-bold transition-all shadow-sm" data-status="All">All</button>
                <button class="tab-btn text-gray-500 hover:bg-white/50 px-8 py-2 rounded-lg text-sm font-bold transition-all" data-status="Open">Open</button>
                <button class="tab-btn text-gray-500 hover:bg-white/50 px-8 py-2 rounded-lg text-sm font-bold transition-all" data-status="Closed">Closed</button>
            </div>

            <div class="bg-white border-2 border-indigo-500 rounded-[32px] p-8 shadow-sm">
                <div class="flex flex-col md:flex-row justify-between items-center mb-6">
                    <div class="flex items-center gap-5">
                        <div class="bg-indigo-50 p-3 rounded-2xl"><img src="assets/Aperture.png" class="w-10 h-10" alt="icon"></div>
                        <div>
                            <h2 class="font-extrabold text-2xl text-gray-800"><span id="total-issues">0</span> Issues</h2>
                            <p class="text-gray-400 text-sm font-medium">Track and manage your project issues efficiently</p>
                        </div>
                    </div>
                    <div class="flex gap-6 mt-5 md:mt-0">
                        <div class="flex items-center gap-2 text-sm font-bold text-gray-600 uppercase tracking-tighter">
                            <span class="w-3 h-3 bg-green-500 rounded-full"></span> Open
                        </div>
                        <div class="flex items-center gap-2 text-sm font-bold text-gray-600 uppercase tracking-tighter">
                            <span class="w-3 h-3 bg-purple-500 rounded-full"></span> Closed
                        </div>
                    </div>
                </div>

                <div class="border-t-2 border-dashed border-indigo-100 pt-8">
                    <div id="loader" class="flex justify-center my-10 hide"><div class="spinner"></div></div>
                    <div id="issues-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="issue-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 hide">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-xl overflow-hidden">
            <div id="modal-loader" class="p-20 flex justify-center"><div class="spinner"></div></div>
            <div id="modal-content" class="p-8 hide">
                <div class="flex justify-between items-start mb-6">
                    <h2 id="modal-title" class="text-2xl font-black text-gray-800 pr-6">Title</h2>
                    <button id="close-modal" class="text-gray-400 hover:text-red-500 transition text-2xl">✕</button>
                </div>
                <div id="modal-labels" class="flex flex-wrap gap-2 mb-6"></div>
                <p id="modal-desc" class="text-gray-600 bg-gray-50 p-6 rounded-2xl mb-6 italic">Description...</p>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-indigo-50/50 p-4 rounded-xl">
                        <p class="text-[10px] uppercase font-black text-indigo-400 mb-1">Author</p>
                        <p id="modal-author" class="font-bold text-gray-700">-</p>
                    </div>
                    <div class="bg-rose-50/50 p-4 rounded-xl">
                        <p class="text-[10px] uppercase font-black text-rose-400 mb-1">Priority</p>
                        <p id="modal-priority" class="font-bold text-gray-700">-</p>
                    </div>
                </div>
                <button id="close-modal-btn" class="w-full bg-gray-900 text-white py-4 rounded-xl font-bold">Close Window</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
